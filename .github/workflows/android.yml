name: Türkiye Canlı TV build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"
          cache-provider: basic

      - name: Build and lint
        run: gradle :app:testDebugUnitTest :app:assembleDebug :app:lint

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: TurkiyeCanliTV-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  startup-smoke-test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"
          cache-provider: basic

      - name: Start Android 23 emulator and test app startup
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 23
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: gradle :app:connectedDebugAndroidTest --stacktrace --no-daemon
