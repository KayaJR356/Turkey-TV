name: Publish signed app release

on:
  push:
    branches:
      - main
    paths:
      - app/build.gradle
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: debug-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read application version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(sed -n -E "s/^[[:space:]]*versionName[[:space:]]+['\"]([^'\"]+)['\"].*/\1/p" app/build.gradle | head -n 1)"
          if [[ -z "$VERSION" ]]; then
            echo "versionName could not be read from app/build.gradle" >&2
            exit 1
          fi

          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        if: steps.version.outputs.exists == 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: steps.version.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"
          cache-provider: basic

      - name: Restore stable update signing key
        if: steps.version.outputs.exists == 'false'
        env:
          UPDATE_KEYSTORE_BASE64: ${{ secrets.UPDATE_KEYSTORE_BASE64 }}
          UPDATE_KEYSTORE_PASSWORD: ${{ secrets.UPDATE_KEYSTORE_PASSWORD }}
          UPDATE_KEY_ALIAS: ${{ secrets.UPDATE_KEY_ALIAS }}
          UPDATE_KEY_PASSWORD: ${{ secrets.UPDATE_KEY_PASSWORD }}
        run: |
          if [[ -z "$UPDATE_KEYSTORE_BASE64" || -z "$UPDATE_KEYSTORE_PASSWORD" \
             || -z "$UPDATE_KEY_ALIAS" || -z "$UPDATE_KEY_PASSWORD" ]]; then
            echo "Update signing secrets are missing. See docs/RELEASING.md." >&2
            exit 1
          fi
          KEYSTORE="$RUNNER_TEMP/turkiye-tv-update.p12"
          printf '%s' "$UPDATE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          echo "UPDATE_KEYSTORE_FILE=$KEYSTORE" >> "$GITHUB_ENV"
          echo "UPDATE_KEYSTORE_PASSWORD=$UPDATE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "UPDATE_KEY_ALIAS=$UPDATE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "UPDATE_KEY_PASSWORD=$UPDATE_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build and lint
        if: steps.version.outputs.exists == 'false'
        run: gradle :app:testDebugUnitTest :app:assembleRelease :app:lint --no-daemon

      - name: Package APK and checksum
        if: steps.version.outputs.exists == 'false'
        id: package
        run: |
          mkdir -p dist
          APK="Turkiye-Canli-TV-${{ steps.version.outputs.version }}.apk"
          cp app/build/outputs/apk/release/app-release.apk "dist/$APK"
          sha256sum "dist/$APK" > "dist/$APK.sha256"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        if: steps.version.outputs.exists == 'false'
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          awk -v version="$VERSION" '
            $0 ~ ("^## \\[" version "\\] - ") { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > dist/CHANGELOG_SECTION.md

          if [[ ! -s dist/CHANGELOG_SECTION.md ]]; then
            echo "CHANGELOG.md does not contain a release section for $VERSION" >&2
            exit 1
          fi

          {
            echo "## Türkiye Canlı TV $VERSION"
            cat dist/CHANGELOG_SECTION.md
            printf '%s\n' \
              '' \
              '### Doğrulama ve güncelleme' \
              '- Birim testleri, Android release build ve Lint GitHub Actions üzerinde çalıştırıldı' \
              '- İmzalı APK ile SHA-256 checksum birlikte yayımlandı' \
              '- Uygulama bu sürümü açılışta otomatik algılar ve özeti kurulumdan önce doğrular' \
              '- Android güvenliği gereği son kurulum onayı cihazda verilir' \
              '' \
              '> [!NOTE]' \
              '> Üçüncü taraf yayınların erişilebilirliği yayıncıya, bölgeye ve zamana göre değişebilir; uygulama başarısız kanalları katalogdan silmez.'
          } > dist/RELEASE_NOTES.md

      - name: Publish GitHub release
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/${{ steps.package.outputs.apk }}" \
            "dist/${{ steps.package.outputs.apk }}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Türkiye Canlı TV ${{ steps.version.outputs.version }}" \
            --notes-file dist/RELEASE_NOTES.md
