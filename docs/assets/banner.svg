<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">Türkiye Canlı TV</title>
  <desc id="desc">Android TV ve Google TV için kumanda odaklı canlı yayın oynatıcısı</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset=".55" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="tv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <rect width="1600" height="500" rx="28" fill="url(#bg)"/>
  <g opacity=".08" stroke="#fee2e2">
    <path d="M0 100H1600M0 200H1600M0 300H1600M0 400H1600"/>
    <path d="M200 0V500M400 0V500M600 0V500M800 0V500M1000 0V500M1200 0V500M1400 0V500"/>
  </g>
  <g transform="translate(1030 76)">
    <rect width="440" height="292" rx="30" fill="#ef4444" opacity=".2" filter="url(#glow)"/>
    <rect width="440" height="292" rx="30" fill="#0f172a" stroke="url(#tv)" stroke-width="8"/>
    <rect x="30" y="30" width="380" height="232" rx="16" fill="url(#tv)" opacity=".13"/>
    <path d="M180 98L180 194L276 146Z" fill="#f8fafc"/>
    <path d="M184 292V335M256 292V335M145 338H295" stroke="#fecaca" stroke-width="10" stroke-linecap="round"/>
  </g>
  <text x="110" y="205" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="76" font-weight="750" fill="#f8fafc" letter-spacing="-2">Türkiye Canlı TV</text>
  <text x="114" y="270" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" fill="#fee2e2">Kumandanızla hızlı, sade ve tam ekran televizyon.</text>
  <g transform="translate(114 324)">
    <rect width="540" height="54" rx="27" fill="#ffffff" opacity=".1"/>
    <circle cx="31" cy="27" r="8" fill="#fb923c"/>
    <text x="54" y="35" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#fff7ed">Android TV • Google TV • Media3</text>
  </g>
</svg>
